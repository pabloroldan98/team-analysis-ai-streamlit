  # ============================================================
  # FINAL COMMIT - All data (waits for all combines)
  # ============================================================
  commit-all:
    needs: [combine-leagues, combine-teams, combine-players, combine-transfers, combine-valuations]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Download leagues data
        uses: actions/download-artifact@v4
        with:
          name: leagues-all-data
          path: data/json/
      
      - name: Download teams data
        uses: actions/download-artifact@v4
