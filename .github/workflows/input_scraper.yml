          name: valuations-all-data
          path: data/json/valuations_all_*.json
          retention-days: 1

  # ============================================================
  # FINAL COMMIT
  # ============================================================
  commit-all:
    needs: [combine-leagues, combine-teams, combine-players, combine-transfers, combine-valuations]
    if: |
      always() &&
      (needs.combine-leagues.result == 'success' || needs.combine-leagues.result == 'skipped') &&
      (needs.combine-teams.result == 'success' || needs.combine-teams.result == 'skipped') &&
      (needs.combine-players.result == 'success' || needs.combine-players.result == 'skipped') &&
      (needs.combine-transfers.result == 'success' || needs.combine-transfers.result == 'skipped') &&
      (needs.combine-valuations.result == 'success' || needs.combine-valuations.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Download leagues data
        if: ${{ inputs.scrape_leagues }}
        uses: actions/download-artifact@v4
        with:
          name: leagues-all-data
          path: data/json/
        continue-on-error: true
      
      - name: Download teams data
        if: ${{ inputs.scrape_teams }}
        uses: actions/download-artifact@v4
        with:
          name: teams-all-data
          path: data/json/
        continue-on-error: true
      
      - name: Download players data
        if: ${{ inputs.scrape_players }}
        uses: actions/download-artifact@v4
        with:
          name: players-all-data
          path: data/json/
        continue-on-error: true
      
      - name: Download transfers data
        if: ${{ inputs.scrape_transfers }}
        uses: actions/download-artifact@v4
        with:
          name: transfers-all-data
          path: data/json/
        continue-on-error: true
      
      - name: Download valuations data
        if: ${{ inputs.scrape_valuations }}
        uses: actions/download-artifact@v4
        with:
          name: valuations-all-data
          path: data/json/
        continue-on-error: true
      
      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          ls -la data/json/ || echo "No data/json directory"
      
      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      
      - name: Update auto-update trigger in streamlit_app.py
        run: |
          TRIGGER_LINE="# Auto-update trigger: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          if grep -q "^# Auto-update trigger:" streamlit_app.py; then
            sed -i "s/^# Auto-update trigger:.*/$TRIGGER_LINE/" streamlit_app.py
          else
            echo "$TRIGGER_LINE" >> streamlit_app.py
          fi

      - name: Commit changes
        run: |
          git add data/json/ streamlit_app.py
          git diff --staged --quiet || git commit -m "Custom scraper update [$(date -u '+%Y-%m-%d')]"
      
      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
