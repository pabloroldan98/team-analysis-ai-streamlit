# .github/workflows/input_scraper.yml
name: Input Scraper - Custom Leagues & Seasons

on:
  workflow_dispatch:
    inputs:
      leagues:
        description: 'Leagues to scrape (JSON array, e.g., ["laliga", "premier", "bundesliga", "seriea", "ligue1"] or ["laliga"])'
        required: true
        default: '["laliga"]'
        type: string
      seasons:
        description: 'Seasons to scrape (JSON array, e.g., ["2025-2026", "2024-2025"] or ["2025-2026"])'
        required: true
        default: '["2025-2026"]'
        type: string
      scrape_leagues:
        description: 'Scrape Leagues'
        required: false
        default: true
        type: boolean
      scrape_teams:
        description: 'Scrape Teams'
        required: false
        default: true
        type: boolean
      scrape_players:
        description: 'Scrape Players'
        required: false
        default: true
        type: boolean
      scrape_transfers:
        description: 'Scrape Transfers'
        required: false
        default: true
        type: boolean
      scrape_valuations:
        description: 'Scrape Valuations'
        required: false
        default: true
        type: boolean

concurrency:
  group: input-scraper
  cancel-in-progress: false

jobs:
  # ============================================================
  # LEAGUES
  # ============================================================
  scrape-leagues:
    if: ${{ inputs.scrape_leagues }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        league: ${{ fromJSON(inputs.leagues) }}
        season: ${{ fromJSON(inputs.seasons) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Run leagues scraper for ${{ matrix.league }} (${{ matrix.season }})
        run: |
          python scraping_tasks/scrape_leagues.py --leagues ${{ matrix.league }} --season ${{ matrix.season }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leagues-${{ matrix.league }}-${{ matrix.season }}
          path: data/json/leagues_${{ matrix.league }}_${{ matrix.season }}.json
          retention-days: 1
          if-no-files-found: error

  combine-leagues:
    if: ${{ inputs.scrape_leagues }}
    needs: scrape-leagues
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/json/
          pattern: leagues-*
          merge-multiple: true
      
      - name: Combine into _all_ files
        run: |
          for season in ${{ join(fromJSON(inputs.seasons), ' ') }}; do
            python scraping_tasks/combine_data.py --entity leagues --season $season
          done
      
      - name: Upload all data
        uses: actions/upload-artifact@v4
        with:
          name: leagues-all-data
          path: data/json/leagues_all_*.json
          retention-days: 1

  # ============================================================
  # TEAMS
  # ============================================================
  scrape-teams:
    if: ${{ inputs.scrape_teams }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        league: ${{ fromJSON(inputs.leagues) }}
        season: ${{ fromJSON(inputs.seasons) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Run teams scraper for ${{ matrix.league }} (${{ matrix.season }})
        run: |
          python scraping_tasks/scrape_teams.py --leagues ${{ matrix.league }} --season ${{ matrix.season }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: teams-${{ matrix.league }}-${{ matrix.season }}
          path: data/json/teams_${{ matrix.league }}_${{ matrix.season }}.json
          retention-days: 1
          if-no-files-found: error

  combine-teams:
    if: ${{ inputs.scrape_teams }}
    needs: scrape-teams
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/json/
          pattern: teams-*
          merge-multiple: true
      
      - name: Combine into _all_ files
        run: |
          for season in ${{ join(fromJSON(inputs.seasons), ' ') }}; do
            python scraping_tasks/combine_data.py --entity teams --season $season
          done
      
      - name: Upload all data
        uses: actions/upload-artifact@v4
        with:
          name: teams-all-data
          path: data/json/teams_all_*.json
          retention-days: 1

  # ============================================================
  # PLAYERS
  # ============================================================
  scrape-players:
    if: ${{ inputs.scrape_players }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        league: ${{ fromJSON(inputs.leagues) }}
        season: ${{ fromJSON(inputs.seasons) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Run players scraper for ${{ matrix.league }} (${{ matrix.season }})
        run: |
          python scraping_tasks/scrape_players.py --leagues ${{ matrix.league }} --season ${{ matrix.season }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: players-${{ matrix.league }}-${{ matrix.season }}
          path: data/json/players_${{ matrix.league }}_${{ matrix.season }}.json
          retention-days: 1
          if-no-files-found: error

  combine-players:
    if: ${{ inputs.scrape_players }}
    needs: scrape-players
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/json/
          pattern: players-*
          merge-multiple: true
      
      - name: Combine into _all_ files
        run: |
          for season in ${{ join(fromJSON(inputs.seasons), ' ') }}; do
            python scraping_tasks/combine_data.py --entity players --season $season
          done
      
      - name: Upload all data
        uses: actions/upload-artifact@v4
        with:
          name: players-all-data
          path: data/json/players_all_*.json
          retention-days: 1

  # ============================================================
  # TRANSFERS
  # ============================================================
  scrape-transfers:
    if: ${{ inputs.scrape_transfers }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        league: ${{ fromJSON(inputs.leagues) }}
        season: ${{ fromJSON(inputs.seasons) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Run transfers scraper for ${{ matrix.league }} (${{ matrix.season }})
        run: |
          python scraping_tasks/scrape_transfers.py --leagues ${{ matrix.league }} --season ${{ matrix.season }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transfers-${{ matrix.league }}-${{ matrix.season }}
          path: data/json/transfers_${{ matrix.league }}_${{ matrix.season }}.json
          retention-days: 1
          if-no-files-found: error

  combine-transfers:
    if: ${{ inputs.scrape_transfers }}
    needs: scrape-transfers
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
