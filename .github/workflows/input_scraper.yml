      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/json/
          pattern: transfers-*
          merge-multiple: true
      
      - name: Combine into _all_ files
        run: |
          for season in ${{ join(fromJSON(inputs.seasons), ' ') }}; do
            python scraping_tasks/combine_data.py --entity transfers --season $season
          done
      
      - name: Upload all data
        uses: actions/upload-artifact@v4
        with:
          name: transfers-all-data
          path: data/json/transfers_all_*.json
          retention-days: 1

  # ============================================================
  # VALUATIONS
