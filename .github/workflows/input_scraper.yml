  scrape-valuations:
    if: ${{ inputs.scrape_valuations }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        league: ${{ fromJSON(inputs.leagues) }}
        season: ${{ fromJSON(inputs.seasons) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Run valuations scraper for ${{ matrix.league }} (${{ matrix.season }})
        run: |
          python scraping_tasks/scrape_valuations.py --leagues ${{ matrix.league }} --season ${{ matrix.season }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: valuations-${{ matrix.league }}-${{ matrix.season }}
          path: data/json/valuations_${{ matrix.league }}_${{ matrix.season }}.json
          retention-days: 1
          if-no-files-found: error

  combine-valuations:
    if: ${{ inputs.scrape_valuations }}
    needs: scrape-valuations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/json/
          pattern: valuations-*
          merge-multiple: true
      
      - name: Combine into _all_ files
        run: |
          for season in ${{ join(fromJSON(inputs.seasons), ' ') }}; do
            python scraping_tasks/combine_data.py --entity valuations --season $season
          done
      
      - name: Upload all data
        uses: actions/upload-artifact@v4
