# .github/workflows/manual_scraper_current_all.yml
name: Manual Scraper - Current (all data of all leagues)

on:
  workflow_dispatch:

concurrency:
  group: manual-scraper-current-all
  cancel-in-progress: false

jobs:
  # ============================================================
  # LEAGUES
  # ============================================================
  scrape-leagues:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        league:
          # Europe – Tier 1
          - laliga
          - premier
          - seriea
          - bundesliga
          - ligue1
          - liga_portugal
          - turkish
          - eredivisie
          - russian
          - belgian
          - greek
          - danish
          - ukrainian
          - czech
          - polish
          - swiss
          - scottish
          - austrian
          - norwegian
          - serbian
          - romanian
          - swedish
          - croatian
          - bulgarian
          - israeli
          - cypriot
          - hungarian
          - azerbaijani
          - slovak
          # Europe – Tier 2
          - segunda
          - championship
          - serieb
          - bundesliga2
          - ligue2
          - liga_portugal2
          - turkish2
          - dutch2
          - belgian2
          - russian2
          # Europe – Tier 3
          - leagueone
          - bundesliga3
          - seriec1
          - seriec2
          - seriec3
          - primeraref1
          - primeraref2
          # Europe – Tier 4
          - leaguetwo
          # Americas – Tier 1
          - brazilian
          - mls
          - argentine
          - mexican
          - colombian
          - uruguayan
          - chilean
          - ecuadorian
          - peruvian
          - paraguayan
          # Americas – Tier 2
          - brazilian2
          - argentine2
          # Asia – Tier 1
          - saudi
          - qatari
          - emirati
          - japanese
          - chinese
          - iranian
          - korean
          - australian
          # Asia – Tier 2
          - japanese2
          # Africa – Tier 1
          - egyptian
          - south_african
          - moroccan
          # Youth
          - primavera1
          - u19_bundesliga_a
          - u19_bundesliga_h
          - liga_revelacao
        season:
          - 20025-2026
          # - 2024-2025
          # - 2023-2024
          # - 2022-2023
          # - 2021-2022
          # - 2020-2021
          # - 2019-2020
          # - 2018-2019
          # - 2017-2018
          # - 2016-2017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true

      - name: Run leagues scraper for ${{ matrix.league }} (${{ matrix.season }})
        run: |
          python scraping_tasks/scrape_leagues.py --leagues ${{ matrix.league }} --season ${{ matrix.season }} --use-downloaded-data

      - name: Upload league artifact
        uses: actions/upload-artifact@v4
        with:
          name: leagues-${{ matrix.league }}-${{ matrix.season }}
          path: data/json/leagues_${{ matrix.league }}_${{ matrix.season }}.json
          retention-days: 1
          if-no-files-found: error

  combine-leagues:
    needs: scrape-leagues
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Pre-load TLS client (suppress download progress)
        run: python -c "import tls_requests; tls_requests.get('https://httpbin.org/get', timeout=10)" > /dev/null 2>&1 || true

      - name: Download all league artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/json/
          pattern: leagues-*
          merge-multiple: true

      - name: Combine into _all_ files
        run: |
          for season in $(ls data/json/leagues_*.json 2>/dev/null | grep -v '_all_' | grep -v '_OLD' | sed -E 's/.*_([0-9]{4}-[0-9]{4})\.json/\1/' | sort -u); do
            python scraping_tasks/combine_data.py --entity leagues --season $season
          done

      - name: Upload all leagues data
        uses: actions/upload-artifact@v4
        with:
          name: leagues-all-data
          path: data/json/leagues_all_*.json
          retention-days: 1

